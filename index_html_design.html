<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 2 - Vertical Menu</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        .menu {
            width: 250px;
            background-color: #808080;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 15px;
            color: white;
        }

        .item: hover {
            background-color: #5a5a5a;
        }

        .item img {
            width: 30px;
            margin-right: 15px;
        }
    </style>
</head>

<body>

<div class="menu">

    <div class="item">
        <img src="edit.png" alt="">
        <span>EDIT</span>
    </div>

    <div class="item">
        <img src="favorites.png" alt="">
        <span>FAVORITES</span>
    </div>

    <div class="item">
        <img src="history.png" alt="">
        <span>HISTORY</span>
    </div>

    <div class="item">
        <img src="security.png" alt="">
        <span>SECURITY</span>
    </div>

    <div class="item">
        <img src="settings.png" alt="">
        <span>SETTINGS</span>
    </div>

</div>

</body>
</html>

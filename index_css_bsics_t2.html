<!DOCTYPE html>
<html>

<head>
    <title>To Do List</title>

    <style>
        body{
            font-family: Arial;
        }

        .box{
            width:350px;
        }

        .blue{
            background-color:#bce3ee;
            padding:10px;
        }

        .light{
            background-color:#e2f2f8;
            padding:10px;
        }

        .done{
            background-color:#d9d9d9;
            padding:10px;
            color:gray;
        }

        .x{
            color:red;
        }
    </style>

</head>

<body>

<div class="box">

<h2>My To Do List</h2>

<div class="blue">
    <input type="checkbox"> Hit the gym
    <span class="x">✖</span>
</div>

<div class="done">
    <input type="checkbox" checked> Pay bills
    <span class="x">✖</span>
</div>

<div class="blue">
    <input type="checkbox"> Meet John
    <span class="x">✖</span>
</div>

<div class="light">
    <input type="checkbox"> Buy eggs
    <span class="x">✖</span>
</div>

<div class="done">
    <input type="checkbox" checked> Read a book
    <span class="x">✖</span>
</div>

<div class="light">
    <input type="checkbox"> Organize office
    <span class="x">✖</span>
</div>

<div class="blue">
    <input type="checkbox"> Eat dinner
    <span class="x">✖</span>
</div>

</div>

</body>

</html>

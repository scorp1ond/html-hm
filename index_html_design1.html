<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 30px;
}

h2{
    text-align: center;
}

.products{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.product{
    width: 120px;
    border: 1px solid gray;
    padding: 10px;
    text-align: center;
    box-sizing: border-box;
}

.product img{
    width: 70px;
    height: 70px;
}

.product p{
    margin: 10px 0 0;
}

hr{
    margin-top: 30px;
}

.end{
    font-weight: bold;
}
</style>

</head>
<body>

<h2>What do I have in my fridge?</h2>

<div class="products">

    <div class="product">
        <img src="pepper.png" alt="Pepper">
        <p>Pepper</p>
    </div>

    <div class="product">
        <img src="apple.png" alt="Apple">
        <p>Apple</p>
    </div>

    <div class="product">
        <img src="cheese.png" alt="Cheese">
        <p>Cheese</p>
    </div>

    <div class="product">
        <img src="corn.png" alt="Corn">
        <p>Corn</p>
    </div>

    <div class="product">
        <img src="mushroom.png" alt="Mushroom">
        <p>Mushroom</p>
    </div>

    <div class="product">
        <img src="garlic.png" alt="Garlic">
        <p>Garlic</p>
    </div>

    <div class="product">
        <img src="beef.png" alt="Beef">
        <p>Beef</p>
    </div>

    <div class="product">
        <img src="fish.png" alt="Fish">
        <p>Fish</p>
    </div>

    <div class="product">
        <img src="egg.png" alt="Egg">
        <p>Egg</p>
    </div>

    <div class="product">
        <img src="1.png" alt="Coriander">
        <p>Coriander</p>
    </div>

</div>

<hr>

<p class="end">that's all.</p>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <title>Fruits</title>

    <style>
        body{
            font-family: Arial;
        }

        .box{
            background-color: pink;
            width:300px;
            padding:20px;
        }

        ul{
            list-style:none;
            padding:0;
        }

        li{
            background-color:#d96b7b;
            color:white;
            margin-bottom:5px;
            padding:10px;
        }

        .name{
            background-color:#a82b42;
            padding:10px;
            margin-left:10px;
        }
    </style>
</head>

<body>

<div class="box">

<ul>
    <li>1. <span class="name">Apple</span></li>
    <li>2. <span class="name">Orange</span></li>
    <li>3. <span class="name">Pineapple</span></li>
    <li>4. <span class="name">Pear</span></li>
    <li>5. <span class="name">Cherry</span></li>
</ul>

</div>

</body>

</html>
